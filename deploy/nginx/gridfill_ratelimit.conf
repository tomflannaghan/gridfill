# Rate-limiting zones for the gridfill backend. Lives in conf.d so the zones
# are declared in nginx's http{} context; the site config references them in
# its /api/ location. Detection is CPU/memory heavy, so keep the sustained
# rate low and rely on a small burst for interactive use.
limit_req_zone $binary_remote_addr zone=gridfill_api:10m rate=20r/m;
limit_conn_zone $binary_remote_addr zone=gridfill_conn:10m;
