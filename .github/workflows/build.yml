name: Build standalone executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - run: uv sync --extra build

      - run: uv run pyinstaller --noconfirm --clean packaging/crossword-transcriber.spec

      - uses: actions/upload-artifact@v4
        with:
          name: crossword-transcriber-${{ matrix.os }}
          path: |
            dist/crossword-transcriber
            dist/crossword-transcriber.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          mkdir -p release
          cp artifacts/crossword-transcriber-ubuntu-latest/crossword-transcriber release/crossword-transcriber-linux
          cp artifacts/crossword-transcriber-windows-latest/crossword-transcriber.exe release/crossword-transcriber-windows.exe

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
