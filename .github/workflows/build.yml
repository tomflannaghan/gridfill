name: Build standalone executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --extra build

      - run: uv run pyinstaller --noconfirm --clean packaging/gridfill.spec

      - uses: actions/upload-artifact@v4
        with:
          name: gridfill-${{ matrix.os }}
          path: |
            python/dist/gridfill
            python/dist/gridfill.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          mkdir -p release
          cp artifacts/gridfill-ubuntu-latest/gridfill release/gridfill-linux
          cp artifacts/gridfill-windows-latest/gridfill.exe release/gridfill-windows.exe
          cp artifacts/gridfill-macos-latest/gridfill release/gridfill-macos

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
