name: Build standalone executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # PyInstaller needs to link against a Tcl/Tk that's actually consistent
    # with the running Python -- uv's managed (python-build-standalone) builds
    # bundle a Tcl/Tk that doesn't survive freezing on Linux (undefined symbol
    # `TclBN_mp_to_ubin` at runtime). The runner's own Python doesn't have
    # this problem, so use that instead of letting uv download one.
    env:
      UV_NO_MANAGED_PYTHON: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --extra build

      - run: uv run pyinstaller --noconfirm --clean packaging/gridfill.spec

      - uses: actions/upload-artifact@v4
        with:
          name: gridfill-${{ matrix.os }}
          path: |
            dist/gridfill
            dist/gridfill.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          mkdir -p release
          cp artifacts/gridfill-ubuntu-latest/gridfill release/gridfill-linux
          cp artifacts/gridfill-windows-latest/gridfill.exe release/gridfill-windows.exe
          cp artifacts/gridfill-macos-latest/gridfill release/gridfill-macos

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
