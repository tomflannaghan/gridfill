<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <rect x="0" y="0" width="120" height="120" rx="16" fill="#ffffff"/>

  <!-- grid outline -->
  <rect x="10" y="10" width="100" height="100" fill="none" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>

  <!-- thin dividers -->
  <line x1="43.33" y1="10" x2="43.33" y2="110" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="76.67" y1="10" x2="76.67" y2="110" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="10" y1="43.33" x2="110" y2="43.33" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="10" y1="76.67" x2="110" y2="76.67" stroke="#1a1a1a" stroke-width="2"/>

  <!-- bars: thick strokes marking barred word breaks -->
  <line x1="43.33" y1="43.33" x2="43.33" y2="76.67" stroke="#1a1a1a" stroke-width="7" stroke-linecap="butt"/>
  <line x1="76.67" y1="76.67" x2="110" y2="76.67" stroke="#1a1a1a" stroke-width="7" stroke-linecap="butt"/>

  <!-- filled letters -->
  <text x="26.67" y="28" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="26" fill="#1a1a1a">G</text>
  <text x="93.33" y="94.5" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="26" fill="#1a1a1a">F</text>
</svg>
